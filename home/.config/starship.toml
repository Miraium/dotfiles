format = """
[](nord0)\
$username\
[@](bg:nord0 fg:nord4)\
$hostname\
$os\
[](bg:nord1 fg:nord0)\
$directory\
[](bg:nord2 fg:nord1)\
$git_branch\
$git_status\
$git_metrics\
[](bg:nord3 fg:nord2)\
$python\
$nodejs\
$rust\
$golang\
[](fg:nord3)
$status
"""

scan_timeout = 50
command_timeout = 1000
add_newline = false
palette = "nord"

[palettes.nord]
nord0 = "#2E3440"
nord1 = "#3B4252"
nord2 = "#434C5E"
nord3 = "#4C566A"
nord4 = "#D8DEE9"
nord11 = "#BF616A"
nord13 = "#EBCB8B"
nord14 = "#A2BE8A"

[username]
style_root = "bg:nord0 fg:nord11"
style_user = "bg:nord0 fg:nord4"
format = "[$user]($style)"
show_always = true
disabled = false

[hostname]
ssh_only = false
ssh_symbol = " "
trim_at = "."
format = "[$hostname$ssh_symbol]($style)"
style = "bg:nord0 fg:nord4"
disabled = false

[os]
format = "[ $symbol ]($style)"
style = "bg:nord0 fg:nord4"
disabled = false

[directory]
truncation_length = 1
truncate_to_repo = true
format = "[ $path ]($style)[$read_only]($read_only_style)"
style = "bg:nord1 fg:nord4"
read_only = " 󰌾 "
read_only_style = "bg:nord1 fg:nord11"
truncation_symbol = ""

[git_branch]
symbol = ""
style = "bg:nord2 fg:nord4"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:nord2 fg:nord4"
format = "[$all_status$ahead_behind ]($style)"

[git_metrics]
added_style = "bg:nord2 fg:nord14"
deleted_style = "bg:nord2 fg:nord11"
format = "[+$added ]($added_style)[-$deleted ]($deleted_style)"
disabled = false

[python]
symbol = " "
style = "bg:nord3 fg:nord4"
format = "[ $symbol ($version) (\\($virtualenv\\)) ]($style)"

[nodejs]
symbol = ""
style = "bg:nord3 fg:nord4"
format = "[ $symbol ($version) ]($style)"

[rust]
symbol = ""
style = "bg:nord3 fg:nord4"
format = "[ $symbol ($version) ]($style)"

[golang]
symbol = " "
style = "bg:nord3 fg:nord4"
format = "[ $symbol ($version) ]($style)"

[status]
format = "[ $symbol ]($style)"
style = "bold"
symbol = "[](fg:nord11)"
success_symbol = "[](fg:nord14)"
not_executable_symbol = "[X](fg:nord11)"
not_found_symbol = "[?](fg:nord11)"
sigint_symbol = "[!](fg:nord13)"
signal_symbol = "[!](fg:nord11)"
disabled = false

[os.symbols]
Ubuntu = " "
Macos = " "
Windows = "󰍲 "
Linux = " "
Unknown = " "
